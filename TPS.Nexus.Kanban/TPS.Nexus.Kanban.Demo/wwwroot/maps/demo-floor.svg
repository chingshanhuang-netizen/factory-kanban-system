<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#2a6090"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Floor background -->
  <rect width="1000" height="500" fill="#070e18"/>

  <!-- Factory outer wall -->
  <rect x="12" y="12" width="976" height="476" fill="none" stroke="#1a3a5c" stroke-width="2.5" rx="6"/>

  <!-- Zone dividers -->
  <line x1="346" y1="12" x2="346" y2="488" stroke="#1a3a5c" stroke-width="1.2" stroke-dasharray="8,4" opacity="0.7"/>
  <line x1="654" y1="12" x2="654" y2="488" stroke="#1a3a5c" stroke-width="1.2" stroke-dasharray="8,4" opacity="0.7"/>

  <!-- ── Zone A: 生產加工區 ─────────────────────────────────── -->
  <rect x="20" y="20" width="318" height="460" fill="#080f1c" rx="3" opacity="0.5"/>
  <text x="179" y="52" fill="#2a6090" font-size="15" text-anchor="middle"
        font-family="Arial,sans-serif" font-weight="bold" letter-spacing="1">生產加工區</text>

  <!-- Machines in Zone A -->
  <rect x="40"  y="75"  width="70" height="55"  fill="#0c1e33" stroke="#1e5082" stroke-width="1" rx="3"/>
  <text x="75"  y="107" fill="#3a7aaa" font-size="9" text-anchor="middle" font-family="Arial,sans-serif">原料儲倉</text>

  <rect x="140" y="75"  width="70" height="100" fill="#0c1e33" stroke="#1e5082" stroke-width="1" rx="3"/>
  <text x="175" y="130" fill="#3a7aaa" font-size="9" text-anchor="middle" font-family="Arial,sans-serif">車床 A1</text>

  <rect x="240" y="75"  width="70" height="100" fill="#0c1e33" stroke="#1e5082" stroke-width="1" rx="3"/>
  <text x="275" y="130" fill="#3a7aaa" font-size="9" text-anchor="middle" font-family="Arial,sans-serif">車床 A2</text>

  <!-- Conveyor belt A -->
  <rect x="40" y="310" width="290" height="22" fill="#0c1e33" stroke="#1a3a5c" stroke-width="1" rx="10"/>
  <text x="185" y="325" fill="#2a6090" font-size="9" text-anchor="middle" font-family="Arial,sans-serif">傳送帶 A ────────────────→</text>

  <rect x="40"  y="360" width="80" height="70" fill="#0c1e33" stroke="#1e5082" stroke-width="1" rx="3"/>
  <text x="80"  y="399" fill="#3a7aaa" font-size="9" text-anchor="middle" font-family="Arial,sans-serif">成品暫存</text>

  <rect x="155" y="360" width="80" height="70" fill="#0c1e33" stroke="#1e5082" stroke-width="1" rx="3"/>
  <text x="195" y="399" fill="#3a7aaa" font-size="9" text-anchor="middle" font-family="Arial,sans-serif">工具室</text>

  <rect x="270" y="360" width="60" height="70" fill="#0c1e33" stroke="#1e5082" stroke-width="1" rx="3"/>
  <text x="300" y="399" fill="#3a7aaa" font-size="9" text-anchor="middle" font-family="Arial,sans-serif">配電盤</text>

  <!-- ── Zone B: 組裝作業區 ─────────────────────────────────── -->
  <rect x="354" y="20" width="292" height="460" fill="#080f1c" rx="3" opacity="0.5"/>
  <text x="500" y="52" fill="#2a6090" font-size="15" text-anchor="middle"
        font-family="Arial,sans-serif" font-weight="bold" letter-spacing="1">組裝作業區</text>

  <rect x="374" y="75" width="80" height="80" fill="#0c1e33" stroke="#1e5082" stroke-width="1" rx="3"/>
  <text x="414" y="119" fill="#3a7aaa" font-size="9" text-anchor="middle" font-family="Arial,sans-serif">零件架 B1</text>

  <rect x="546" y="75" width="80" height="80" fill="#0c1e33" stroke="#1e5082" stroke-width="1" rx="3"/>
  <text x="586" y="119" fill="#3a7aaa" font-size="9" text-anchor="middle" font-family="Arial,sans-serif">零件架 B2</text>

  <rect x="374" y="350" width="80" height="60" fill="#0c1e33" stroke="#1e5082" stroke-width="1" rx="3"/>
  <text x="414" y="384" fill="#3a7aaa" font-size="9" text-anchor="middle" font-family="Arial,sans-serif">包裝工作台</text>

  <rect x="546" y="350" width="80" height="60" fill="#0c1e33" stroke="#1e5082" stroke-width="1" rx="3"/>
  <text x="586" y="384" fill="#3a7aaa" font-size="9" text-anchor="middle" font-family="Arial,sans-serif">出貨暫存</text>

  <!-- Conveyor belt B -->
  <rect x="374" y="310" width="252" height="22" fill="#0c1e33" stroke="#1a3a5c" stroke-width="1" rx="10"/>
  <text x="500" y="325" fill="#2a6090" font-size="9" text-anchor="middle" font-family="Arial,sans-serif">傳送帶 B ────────────→</text>

  <!-- ── Zone C: 品質檢測區 ─────────────────────────────────── -->
  <rect x="662" y="20" width="318" height="460" fill="#080f1c" rx="3" opacity="0.5"/>
  <text x="821" y="52" fill="#2a6090" font-size="15" text-anchor="middle"
        font-family="Arial,sans-serif" font-weight="bold" letter-spacing="1">品質檢測區</text>

  <rect x="682" y="75"  width="110" height="80" fill="#0c1e33" stroke="#1e5082" stroke-width="1" rx="3"/>
  <text x="737" y="119" fill="#3a7aaa" font-size="9" text-anchor="middle" font-family="Arial,sans-serif">3D 量測儀</text>

  <rect x="840" y="75"  width="110" height="80" fill="#0c1e33" stroke="#1e5082" stroke-width="1" rx="3"/>
  <text x="895" y="119" fill="#3a7aaa" font-size="9" text-anchor="middle" font-family="Arial,sans-serif">外觀檢測機</text>

  <rect x="682" y="200" width="268" height="60" fill="#0d1a2a" stroke="#7f0000" stroke-width="1" rx="3" opacity="0.8"/>
  <text x="816" y="234" fill="#7f2020" font-size="9" text-anchor="middle" font-family="Arial,sans-serif">⚠ 不合格品隔離區</text>

  <rect x="682" y="360" width="110" height="60" fill="#0c1e33" stroke="#1e5082" stroke-width="1" rx="3"/>
  <text x="737" y="394" fill="#3a7aaa" font-size="9" text-anchor="middle" font-family="Arial,sans-serif">報告工作站</text>

  <rect x="840" y="360" width="110" height="60" fill="#0c1e33" stroke="#1e5082" stroke-width="1" rx="3"/>
  <text x="895" y="394" fill="#3a7aaa" font-size="9" text-anchor="middle" font-family="Arial,sans-serif">標準件倉</text>

  <!-- ── Cross-zone conveyor arrows ────────────────────────── -->
  <line x1="336" y1="200" x2="354" y2="200" stroke="#2a6090" stroke-width="3"
        marker-end="url(#arr)" opacity="0.8"/>
  <line x1="646" y1="200" x2="662" y2="200" stroke="#2a6090" stroke-width="3"
        marker-end="url(#arr)" opacity="0.8"/>

  <!-- ── Doors ────────────────────────────────────────────── -->
  <rect x="12"  y="218" width="5"  height="40" fill="#2a6090" rx="2" opacity="0.8"/>
  <rect x="983" y="218" width="5"  height="40" fill="#2a6090" rx="2" opacity="0.8"/>
  <rect x="490" y="483" width="40" height="5"  fill="#2a6090" rx="2" opacity="0.8"/>

  <!-- ── Grid overlay (subtle) ─────────────────────────────── -->
  <line x1="0" y1="250" x2="1000" y2="250" stroke="#0d1f30" stroke-width="0.6"/>
  <line x1="500" y1="0" x2="500" y2="500" stroke="#0d1f30" stroke-width="0.6"/>
</svg>
